[tools]
go = "1.22"

[tasks.build]
run = [
  "mkdir -p dist",
  "go build -o ./dist/gnosis ./cmd/gnosis",
]
description = "Build the gnosis binary into dist/"

[tasks.localbin]
description = "Install gnosis to ~/.local/bin/gnosis"
run = [
  "mkdir -p ~/.local/bin",
  "go build -o ~/.local/bin/gnosis ./cmd/gnosis",
]

[tasks.test]
description = "Run all Go tests"
run = "go test ./..."

[tasks.checks]
description = "Run formatting, vet, tests, build, and documentation validation"
run = '''
#!/bin/sh

set -eu

unformatted=$(gofmt -l .)
if [ -n "$unformatted" ]; then
  printf 'gofmt required for:\n%s\n' "$unformatted" >&2
  exit 1
fi

go vet ./...
go test ./... -count=1
go test -race ./... -count=1
go build ./...
go run ./cmd/gnosis validate
'''
