[tools]
go = "1.25"
node = "22.12.0"
"npm:@fission-ai/openspec" = "1.6.0"

# Put the dev shim on PATH so `gnosis` runs from source via `go run`.
[env]
_.path = "{{config_root}}/scripts"

[tasks.build]
run = [
  "mkdir -p dist",
  "go build -o ./dist/gnosis ./cmd/gnosis",
]
description = "Build the gnosis binary into dist/"

[tasks.ui]
description = "Build the document UI bundle into cmd/gnosis/ui.html"
run = [
  "npm --prefix ui ci --no-audit --no-fund",
  "npm --prefix ui run build",
]

[tasks.localbin]
description = "Install gnosis to ~/.local/bin/gnosis"
run = [
  "mkdir -p ~/.local/bin",
  "go build -o ~/.local/bin/gnosis ./cmd/gnosis",
]

[tasks.maintain-skills]
description = "Maintain .claude/skills and .agents/skills symlinks"
run = '''
#!/bin/sh

set -eu

skill_sources="plugins/gnosis/skills"
skill_targets=".claude/skills .agents/skills"

for target_dir in $skill_targets; do
  mkdir -p "$target_dir"
  find "$target_dir" -mindepth 1 -maxdepth 1 -type l -exec rm {} +

  for source_dir in $skill_sources; do
    if [ ! -d "$source_dir" ]; then
      printf 'missing skill source directory: %s\n' "$source_dir" >&2
      exit 1
    fi

    for source in "$source_dir"/*; do
      [ -d "$source" ] || continue
      [ -f "$source/SKILL.md" ] || continue

      name=${source##*/}
      link="$target_dir/$name"
      relative_target="../../$source"

      if [ -L "$link" ]; then
        if [ "$(readlink "$link")" = "$relative_target" ]; then
          continue
        fi
        rm "$link"
      elif [ -e "$link" ]; then
        printf 'refusing to overwrite non-symlink: %s\n' "$link" >&2
        exit 1
      fi

      ln -s "$relative_target" "$link"
    done
  done
done
'''

[tasks.test]
description = "Run all Go tests"
run = "go test ./..."

[tasks.checks]
description = "Run layout, OpenSpec, Go, build, and gnosis vault validation"
run = '''
#!/bin/sh

set -eu

if [ ! -L openspec ] || [ "$(readlink openspec)" != "docs/openspec" ]; then
  printf 'openspec must be a relative symlink to docs/openspec\n' >&2
  exit 1
fi

openspec_context=$(openspec context --json)
case "$openspec_context" in
  *'"path": "'"$PWD"'"'*) ;;
  *)
    printf 'openspec did not resolve the repository root\n' >&2
    exit 1
    ;;
esac

openspec validate --all --strict --no-interactive
openspec doctor

unformatted=$(gofmt -l .)
if [ -n "$unformatted" ]; then
  printf 'gofmt required for:\n%s\n' "$unformatted" >&2
  exit 1
fi

go vet ./...
go test ./... -count=1
go test -race ./... -count=1
go build ./...

ui_before=$(sha256sum ui/ui.html | cut -d' ' -f1)
npm --prefix ui ci --no-audit --no-fund
npm --prefix ui run build
ui_after=$(sha256sum ui/ui.html | cut -d' ' -f1)
if [ "$ui_before" != "$ui_after" ]; then
  printf 'ui/ui.html is stale; rebuild it with: mise run ui\n' >&2
  exit 1
fi

go run ./cmd/gnosis validate vault
(cd docs/openspec && go run ../../cmd/gnosis validate vault)
'''
